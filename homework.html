<h2>📤 宿題提出</h2>

<div class="homeworkBox">
  <input type="text" id="homeworkTitle" placeholder="宿題の名前">
  <br><br>
  <button onclick="submitHomework()">提出する</button>

  <p id="submitMessage"></p>
</div>
<script>
    function submitHomework(){
  const title = document.getElementById("homeworkTitle").value;

  if(title === ""){
    alert("宿題名を書いてね！");
    return;
  }

  let submissions = JSON.parse(localStorage.getItem("rujyHomework")) || [];

  submissions.push({
    title: title,
    student: localStorage.getItem("savedName") || "名無し",
    date: new Date().toLocaleString()
  });

  localStorage.setItem("rujyHomework", JSON.stringify(submissions));

  document.getElementById("homeworkTitle").value = "";
  document.getElementById("submitMessage").textContent = "提出しました！";
}
</script>
