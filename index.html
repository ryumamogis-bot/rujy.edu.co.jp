<div class="main-content">
  <h4>マップ表示</h4>
  <div class="info-area">
    <p id="result">まだ取得していません</p>
    <div id="map"></div>
  </div>
  <button onclick="getAddress()">住所を取得</button>

  <footer>
    <h5 class="copyright">©RUJY.inc</h5>
    <a href="https://youtube.com/@jyagagames" class="btn2">(Youtubeフォローしてね!!)</a>
  </footer>
</div>

<script>
  let map;
  let marker;
  let savedAddress = null; // localStorage の代わりにメモリで保持

  function getAddress() {
    if (!navigator.geolocation) {
      document.getElementById("result").textContent = "位置情報が使えません";
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async function (position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;
        try {
          const response = await fetch(url);
          const data = await response.json();
          document.getElementById("result").textContent = data.display_name;
          savedAddress = data.display_name; // メモリに保存
          if (marker) map.removeLayer(marker);
          marker = L.marker([lat, lon]).addTo(map);
          map.setView([lat, lon], 15);
        } catch (e) {
          document.getElementById("result").textContent = "住所の取得に失敗しました";
        }
      },
      function () {
        document.getElementById("result").textContent = "位置情報の取得に失敗しました";
      }
    );
  }

  window.onload = function () {
    map = L.map('map').setView([35.681236, 139.767125], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
  };
</script>
