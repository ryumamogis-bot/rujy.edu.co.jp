<div class="main-content">
  <h4>名前登録</h4>
  <input type="text" id="username" placeholder="名前を入力">
  <button onclick="saveName()">登録</button>
  <button onclick="deleteName()">削除</button>
  <h6 id="nameDisplay"></h6>

  <hr>

  <h4>がんばりポイント</h4>
  <p id="studentPoints">ポイント：-</p>

  <footer>
    <h5 class="copyright">©RUJY.inc</h5>
    <a href="https://youtube.com/@jyagagames" class="btn2">(Youtubeフォローしてね!!)</a>
  </footer>
</div>

<script>
  function saveName() {
    const name = document.getElementById("username").value;
    if (name === "") {
      alert("名前を入力してください");
      return;
    }
    localStorage.setItem("savedName", name);
    displayName();
    displayStudentPoints();
  }

  function deleteName() {
    localStorage.removeItem("savedName");
    document.getElementById("nameDisplay").textContent = "";
    document.getElementById("studentPoints").textContent = "ポイント：-";
  }

  function displayName() {
    const saved = localStorage.getItem("savedName");
    if (saved) {
      document.getElementById("nameDisplay").textContent = saved;
    }
  }

  function displayStudentPoints() {
    const name = localStorage.getItem("savedName");
    if (!name) {
      document.getElementById("studentPoints").textContent = "名前が登録されていません";
      return;
    }
    const key = "points_" + name;
    const points = localStorage.getItem(key) || "0";
    document.getElementById("studentPoints").textContent = `ポイント：${points}pt!`;
  }

  window.onload = function () {
    displayName();
    displayStudentPoints();
  };
</script>
